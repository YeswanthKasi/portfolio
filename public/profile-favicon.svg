<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
  <!-- Background -->
  <circle cx="60" cy="60" r="60" fill="#f5f5f0"/>
  
  <!-- Suit Jacket (Maroon) -->
  <path d="M 20 80 C 25 70, 40 65, 60 65 C 80 65, 95 70, 100 80 L 100 120 L 20 120 Z" fill="#800020"/>
  
  <!-- White Shirt -->
  <path d="M 50 65 L 60 85 L 70 65 M 55 66 L 60 80 L 65 66" fill="#ffffff"/>
  
  <!-- Neck -->
  <rect x="55" y="52" width="10" height="14" fill="#f4c9d9" rx="1"/>
  
  <!-- Head -->
  <ellipse cx="60" cy="45" rx="18" ry="20" fill="#f4c9d9"/>
  
  <!-- Hair - Black, styled -->
  <path d="M 42 40 C 42 25, 78 25, 78 40 C 72 28, 60 28, 42 40 Z" fill="#1a1a1a"/>
  <path d="M 42 40 C 45 30, 57 29, 60 32 Q 63 29, 78 40 C 78 28, 74 20, 60 20 C 46 20, 42 28, 42 40 Z" fill="#0a0a0a"/>
  
  <!-- Glasses - Black thin-rimmed -->
  <rect x="46" y="39" width="11" height="8" rx="2" fill="none" stroke="#000000" stroke-width="1.2"/>
  <rect x="63" y="39" width="11" height="8" rx="2" fill="none" stroke="#000000" stroke-width="1.2"/>
  <line x1="57" y1="43" x2="63" y2="43" stroke="#000000" stroke-width="1.3"/>
  <line x1="42" y1="42" x2="46" y2="42" stroke="#000000" stroke-width="0.8"/>
  <line x1="74" y1="42" x2="78" y2="42" stroke="#000000" stroke-width="0.8"/>
  
  <!-- Mustache -->
  <path d="M 52 50 Q 60 48 68 50" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>
  
  <!-- Beard -->
  <path d="M 52 50 Q 50 60 60 62 Q 70 60 68 50 Q 60 56 52 50" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M 53 53 Q 60 58 67 53 Q 60 62 53 53" fill="#1a1a1a"/>
  
  <!-- Eyebrows -->
  <path d="M 48 36 Q 52 34 56 36" fill="none" stroke="#0a0a0a" stroke-width="1.2"/>
  <path d="M 64 36 Q 68 34 72 36" fill="none" stroke="#0a0a0a" stroke-width="1.2"/>
  
  <!-- Eyes -->
  <circle cx="52" cy="43" r="1.2" fill="#000000"/>
  <circle cx="68" cy="43" r="1.2" fill="#000000"/>
  
  <!-- Smile -->
  <path d="M 56 50 Q 60 53 64 50" fill="none" stroke="#0a0a0a" stroke-width="1"/>
  
  <!-- Pocket Square -->
  <polygon points="42,72 47,70 49,74 44,76" fill="#3d5a6c"/>
</svg>